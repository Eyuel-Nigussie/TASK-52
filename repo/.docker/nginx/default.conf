server {
    listen 8000;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;

    client_max_body_size 25M;

    # ─── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                  always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP: strict on-premise SPA — all assets served from same origin.
    # script-src omits 'unsafe-inline': Vite bundles into separate files, no inline scripts.
    # style-src allows 'unsafe-inline' for Tailwind CSS utility classes injected at runtime.
    # frame-ancestors 'none' supersedes X-Frame-Options for modern browsers.
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ─── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ─── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/vetops_access.log;
    error_log  /var/log/nginx/vetops_error.log warn;

    # ─── Health check endpoint ────────────────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ─── Laravel SPA routing ──────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── PHP-FPM passthrough ──────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;

        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        fastcgi_read_timeout    300;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         4 16k;

        # Pass real client IP through proxy
        fastcgi_param  HTTP_X_REAL_IP        $remote_addr;
        fastcgi_param  HTTP_X_FORWARDED_FOR  $proxy_add_x_forwarded_for;
    }

    # ─── Block access to hidden files and sensitive paths ────────────────────
    location ~ /\. {
        deny all;
    }

    location ~ ^/(\.env|composer\.(json|lock)|package\.json|phpunit\.xml) {
        deny all;
        return 404;
    }

    # ─── Static asset caching ─────────────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?|ttf|svg|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }
}
